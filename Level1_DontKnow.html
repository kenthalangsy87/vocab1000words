<script>
  // โค้ดสำหรับสั่งให้ระบบจำข้อมูลไว้ในเครื่อง เล่นตอนไม่มีเน็ตได้
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Flashcard Vocabulary Quiz</title>
    <style>
        /* 🌙 สไตล์ควบคุมสีหน้าจอเมื่อเปิด Night Mode */
body.night-mode {
    background: linear-gradient(135deg, #1a202c, #2d3748) !important;
}

body.night-mode .container {
    background: #1a202c !important;
    color: #f7fafc !important;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
}

body.night-mode .word-card {
    background: #2d3748 !important;
    border-color: #4a5568 !important;
}

body.night-mode .option-btn {
    background: #1a202c !important;
    color: #edf2f7 !important;
    border-color: #4a5568 !important;
}

body.night-mode .option-btn:hover {
    background: #2d3748 !important;
}
        :root {
            --primary: #4a6fa5;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        /* แถบสถานะด้านบน */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: bold;
            color: var(--dark);
        }

        .streak-badge {
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #ffeeba;
        }

        /* การ์ดแสดงคำถาม */
        .word-card {
            background: var(--light);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
        }

        .word-main {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .word-meta {
            font-size: 15px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .pos-tag {
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            text-transform: lowercase;
            font-style: italic;
            margin-right: 5px;
        }

        /* รายการปุ่มตัวเลือก */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #cbd5e1;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            color: var(--dark);
        }

        .option-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* แอนิเมชันเปลี่ยนสีเมื่อตอบ ถูก/ผิด */
        .option-btn.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724 !important;
        }

        .option-btn.wrong {
            background: #f8d7da !important;
            border-color: var(--danger) !important;
            color: #721c24 !important;
        }

        /* ปุ่มเปลี่ยนข้อ */
        .next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        .next-btn:hover {
            background: #365f91;
        }

        /* หน้าจอสรุปผลคะแนน */
        .summary-view {
            display: none;
        }

        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: var(--light);
            border: 5px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin: 20px auto;
            color: var(--dark);
        }

        .restart-btn {
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-view">
            <div style="display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px;">
    <a href="index.html" style="text-decoration: none; flex: 1;">
        <button type="button" style="width: 100%; background: #cbd5e1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; color: #2c3e50; cursor: pointer;">🏠 Home</button>
    </a>

    <button type="button" onclick="resetCurrentQuiz()" style="flex: 1; background: #cbd5e1; border: none; padding: 10px; border-radius: 8px; font-weight: bold; color: #2c3e50; cursor: pointer;">🔄 Refresh</button>

    <button type="button" id="night-mode-toggle" onclick="toggleNightMode()" style="flex: 1; background: #2c3e50; border: none; padding: 10px; border-radius: 8px; font-weight: bold; color: white; cursor: pointer;">🌙 Night</button>
</div>
            <div class="stats-bar">
                <div>ข้อที่: <span id="current-count">1</span>/<span id="total-count">10</span></div>
                <div>คะแนน: <span id="score-display">0</span></div>
                <div class="streak-badge">🔥 Streak: <span id="streak-display">0</span></div>
            </div>

            <div class="word-card">
                <h1 class="word-main" id="word-target">-</h1>
                <div class="word-meta">
                    <span class="pos-tag" id="word-pos">-</span>
                    <span id="word-phonetic">-</span>
                </div>
            </div>

            <div class="options-list" id="options-box">
                </div>

            <button class="next-btn" id="btn-next" onclick="nextQuestion()">คำต่อไป ➡️</button>
        </div>

        <div id="summary-view" class="summary-view">
            <h2>🎉 สรุปผลการทดสอบ</h2>
            <div class="score-circle" id="percent-display">0%</div>
            <p style="font-size: 18px; color: var(--dark);">
                คุณตอบถูกทั้งหมด <span id="final-score" style="color: var(--success); font-weight: bold;">0</span> ข้อ 
                จากคำศัพท์ทั้งหมด <span id="final-total">0</span> คำ
            </p>
            <p id="streak-max-display" style="color: #856404; font-weight: bold;"></p>
    <script>
        // คลังข้อมูลคำศัพท์ 1000 คำแรก (A - BLOW) จากไฟล์ที่คุณแนบมา
        const vocabData = [
    { word: "APART", phonetic: "/əˈpɑːrt/", pos: "adverb", translation: "แยกจากกัน / ห่างกัน" },
    { word: "APPARENT", phonetic: "/əˈpærənt/", pos: "adjective", translation: "ที่เห็นได้ชัด / เด่นชัด" },
    { word: "APPEAR", phonetic: "/əˈpɪr/", pos: "verb", translation: "ปรากฏตัว / ดูเหมือนว่า" },
    { word: "BUSH", phonetic: "/bʊʃ/", pos: "noun", translation: "พุ่มไม้" },
    { word: "COAT", phonetic: "/koʊt/", pos: "noun/verb", translation: "เสื้อโค้ต / เสื้อนอก / เคลือบผิว" },
    { word: "COULD", phonetic: "/kʊd/", pos: "verb (modal)", translation: "สามารถ (รูปอดีตของ can) / อาจจะ" },
    { word: "FAIR", phonetic: "/fer/", pos: "adjective/noun", translation: "ยุติธรรม / งานเทศกาล" },
    { word: "FELLOW", phonetic: "/ˈfeloʊ/", pos: "noun/adjective", translation: "เพื่อนพ้อง / เพื่อนมนุษย์ / เพื่อนร่วมงาน" },
    { word: "FIGHT", phonetic: "/faɪt/", pos: "verb/noun", translation: "ต่อสู้ / การต่อสู้" },
    { word: "FLAT", phonetic: "/flæt/", pos: "adjective/noun", translation: "แบน / ราบ / ห้องชุด (แฟลต)" },
    { word: "FORCE", phonetic: "/fɔːrs/", pos: "noun/verb", translation: "แรง / กำลัง / บังคับ" },
    { word: "FORTUNATE", phonetic: "/ˈfɔːrtʃənət/", pos: "adjective", translation: "โชคดี" },
    { word: "INSURE", phonetic: "/ɪnˈʃʊr/", pos: "verb", translation: "ประกันภัย / รับประกัน" },
    { word: "LEAD", phonetic: "/liːd/", pos: "verb/noun", translation: "นำทาง / เป็นผู้นำ / ตะกั่ว" },
    { word: "LEAST", phonetic: "/liːst/", pos: "adverb/adjective", translation: "น้อยที่สุด" },
    { word: "MAD", phonetic: "/mæd/", pos: "adjective", translation: "บ้า / โกรธจัด" },
    { word: "MIND", phonetic: "/maɪnd/", pos: "noun/verb", translation: "จิตใจ / รังเกียจ / ใส่ใจ" },
    { word: "PARENT", phonetic: "/ˈperənt/", pos: "noun", translation: "ผู้ปกครอง / พ่อหรือแม่" },
    { word: "SPOT", phonetic: "/spɑːt/", pos: "noun/verb", translation: "จุด / สถานที่ / สังเกตเห็น" },
    { word: "STICK", phonetic: "/stɪk/", pos: "noun/verb", translation: "ไม้เท้า / กิ่งไม้ / ติด / ปัก" },
    { word: "TEND", phonetic: "/tend/", pos: "verb", translation: "มักจะ / มีแนวโน้มที่จะ" },
    { word: "THICK", phonetic: "/θɪk/", pos: "adjective", translation: "หนา / เข้มข้น" },
    { word: "THIRST", phonetic: "/θɜːrst/", pos: "noun/verb", translation: "ความกระหายน้ำ" },
    { word: "THOUGH", phonetic: "/ðoʊ/", pos: "conjunction/adverb", translation: "แม้ว่า / ถึงอย่างไรก็ตาม" },
    { word: "TILL", phonetic: "/tɪl/", pos: "conjunction/preposition", translation: "จนกระทั่ง / จนถึง" },
    { word: "TRUTH", phonetic: "/truːθ/", pos: "noun", translation: "ความจริง / สัจจะ" },
    { word: "UNDERNEATH", phonetic: "/ˌʌndərˈniːθ/", pos: "preposition/adverb", translation: "ข้างใต้ / อยู่ข้างล่าง" },
    { word: "WORSE", phonetic: "/wɜːrs/", pos: "adjective/adverb", translation: "แย่ลง / เลวร้ายกว่าเดิม" }
        ];

        // ⚙️ ตั้งค่าจำนวนข้อสอบที่จะสุ่มขึ้นมาเล่นต่อหนึ่งรอบ (ปรับเปลี่ยนได้ตามต้องการ)
        const QUESTIONS_PER_ROUND = 50; 

        let currentPool = [];
        let currentIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let hasAnswered = false;

        // ฟังก์ชันสุ่มลำดับ Array (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
// 🔄 ฟังก์ชันสำหรับปุ่ม Refresh (เริ่มทำข้อ 1 ใหม่)
function resetCurrentQuiz() {
    if (confirm("คุณต้องการเริ่มทำควิซใหม่อีกครั้งใช่หรือไม่?")) {
        startQuiz();
    }
}

// 🌙 ฟังก์ชันสลับโหมดกลางคืน (Night Mode) พร้อมระบบจำค่าในเครื่อง
function toggleNightMode() {
    const body = document.body;
    const btn = document.getElementById('night-mode-toggle');
    
    body.classList.toggle('night-mode');
    
    if (body.classList.contains('night-mode')) {
        btn.innerHTML = "☀️ Light";
        btn.style.background = "#ffffff";
        btn.style.color = "#2c3e50";
        localStorage.setItem('theme', 'dark');
    } else {
        btn.innerHTML = "🌙 Night";
        btn.style.background = "#2c3e50";
        btn.style.color = "#ffffff";
        localStorage.setItem('theme', 'light');
    }
}

// เช็กสถานะ Night Mode ล่าสุดทุกครั้งที่เปิดหน้าเว็บขึ้นมาใหม่
window.addEventListener('DOMContentLoaded', (event) => {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('night-mode');
        const btn = document.getElementById('night-mode-toggle');
        if (btn) {
            btn.innerHTML = "☀️ Light";
            btn.style.background = "#ffffff";
            btn.style.color = "#2c3e50";
        }
    }
})
        
        // ฟังก์ชันเริ่มต้นทำแบบทดสอบใหม่
        function startQuiz() {
            // โคลนคลังคำศัพท์และสุ่มเลือกคำตามจำนวนข้อสอบที่กำหนดไว้
            let shuffledVocab = shuffle([...vocabData]);
            currentPool = shuffledVocab.slice(0, Math.min(QUESTIONS_PER_ROUND, vocabData.length));
            
            currentIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('summary-view').style.display = 'none';
            document.getElementById('total-count').innerText = currentPool.length;
            
            loadQuestion();
        }

        // แสดงคำถามและสร้างตัวเลือกคำตอบ 3 ตัวเลือก
        function loadQuestion() {
            hasAnswered = false;
            document.getElementById('btn-next').style.display = 'none';
            
            const currentData = currentPool[currentIndex];
            
            // แสดงข้อมูลคำศัพท์บนหน้าจอ
            document.getElementById('current-count').innerText = currentIndex + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = streak;
            document.getElementById('word-target').innerText = currentData.word;
            document.getElementById('word-pos').innerText = currentData.pos;
            document.getElementById('word-phonetic').innerText = currentData.phonetic;

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            // ดึงคำแปลอื่นๆ ทั้งหมดในคลังมาเตรียมเป็นตัวเลือกหลอก (คัดคำตอบที่ถูกออกก่อน)
            let wrongCandidates = vocabData
                .map(v => v.translation)
                .filter(t => t !== currentData.translation);
            
            // สุ่มเลือกตัวเลือกหลอกมา 3 ตัวเลือก
            wrongCandidates = shuffle(wrongCandidates).slice(0, 3);
            
            // รวมคำแปลที่ถูกกับคำแปลหลอกเข้าด้วยกัน แล้วสุ่มตำแหน่งปุ่ม
            let finalOptions = [currentData.translation, ...wrongCandidates];
            finalOptions = shuffle(finalOptions);

            // วนลูปสร้างปุ่มตัวเลือกขึ้นมาบนหน้าเว็บ
            finalOptions.forEach(optionText => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = optionText;
                btn.onclick = () => checkAnswer(btn, optionText, currentData.translation);
                optionsBox.appendChild(btn);
            });
        }

        // ฟังก์ชันการตรวจสอบคำตอบเมื่อผู้เรียนคลิกเลือกปุ่ม
        function checkAnswer(selectedBtn, selectedText, correctText) {
            if (hasAnswered) return; // ล็อกเพื่อป้องกันการคลิกคำตอบซ้ำ
            hasAnswered = true;

            const allButtons = document.querySelectorAll('.option-btn');
            
            if (selectedText === correctText) {
                // กรณีตอบถูกต้อง
                selectedBtn.classList.add('correct');
                score++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                
                // ถ้าระบบตอบถูกจะเปลี่ยนเป็นข้อถัดไปให้อัตโนมัติในเวลา 1 วินาที
                setTimeout(() => {
                    nextQuestion();
                }, 1000);
            } else {
                // กรณีตอบผิด
                selectedBtn.classList.add('wrong');
                streak = 0; // รีเซ็ตแต้ม Streak กองไฟกลับเป็นศูนย์
                
                // ไฮไลต์ปุ่มเฉลยตัวเลือกที่ถูกต้องเป็นสีเขียวทันทีเพื่อให้รู้ข้อที่ถูก
                allButtons.forEach(btn => {
                    if (btn.innerText === correctText) {
                        btn.classList.add('correct');
                    }
                });
                
                // แสดงปุ่ม "คำต่อไป" เพื่อให้ผู้เรียนคลิกเปลี่ยนข้อด้วยตนเองเมื่ออ่านเฉลยเสร็จ
                document.getElementById('btn-next').style.display = 'block';
            }

            // สั่งปิดการใช้งานปุ่มทั้งหมดชั่วคราวเพื่อให้อ่านผลลัพธ์
            allButtons.forEach(btn => btn.disabled = true);
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = streak;
        }

        // เปลี่ยนไปยังข้อถัดไป หรือเปลี่ยนไปหน้าสรุปผลถ้าทำครบกำหนด
        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentPool.length) {
                loadQuestion();
            } else {
                showSummary();
            }
        }

        // แสดงหน้าจอสรุปคะแนนหลังทำครบทุกข้อ
        function showSummary() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('summary-view').style.display = 'block';
            
            const percentage = Math.round((score / currentPool.length) * 100);
            document.getElementById('percent-display').innerText = percentage + "%";
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = currentPool.length;
            document.getElementById('streak-max-display').innerText = `🔥 ทำ Streak สูงสุดได้: ${maxStreak} ข้อติดต่อกัน`;
        }

        // เริ่มต้นการทำงานระบบทันทีที่เปิดหน้าเว็บ
        startQuiz();
    </script>

</body>
</html>
