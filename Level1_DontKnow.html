    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Flashcard Vocabulary Quiz</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        /* แถบสถานะด้านบน */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: bold;
            color: var(--dark);
        }

        .streak-badge {
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 15px;
            border: 1px solid #ffeeba;
        }

        /* การ์ดแสดงคำถาม */
        .word-card {
            background: var(--light);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
        }

        .word-main {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
            margin: 0 0 5px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .word-meta {
            font-size: 15px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .pos-tag {
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            text-transform: lowercase;
            font-style: italic;
            margin-right: 5px;
        }

        /* รายการปุ่มตัวเลือก */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #cbd5e1;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            color: var(--dark);
        }

        .option-btn:hover:not(:disabled) {
            background: #f1f5f9;
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* แอนิเมชันเปลี่ยนสีเมื่อตอบ ถูก/ผิด */
        .option-btn.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724 !important;
        }

        .option-btn.wrong {
            background: #f8d7da !important;
            border-color: var(--danger) !important;
            color: #721c24 !important;
        }

        /* ปุ่มเปลี่ยนข้อ */
        .next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: none;
            font-weight: bold;
        }

        .next-btn:hover {
            background: #365f91;
        }

        /* หน้าจอสรุปผลคะแนน */
        .summary-view {
            display: none;
        }

        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: var(--light);
            border: 5px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin: 20px auto;
            color: var(--dark);
        }

        .restart-btn {
            width: 100%;
            padding: 14px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-view">
            <div class="stats-bar">
                <div>ข้อที่: <span id="current-count">1</span>/<span id="total-count">10</span></div>
                <div>คะแนน: <span id="score-display">0</span></div>
                <div class="streak-badge">🔥 Streak: <span id="streak-display">0</span></div>
            </div>

            <div class="word-card">
                <h1 class="word-main" id="word-target">-</h1>
                <div class="word-meta">
                    <span class="pos-tag" id="word-pos">-</span>
                    <span id="word-phonetic">-</span>

            <div class="options-list" id="options-box">

            <p id="streak-max-display" style="color: #856404; font-weight: bold;"></p>
            <button class="restart-btn" onclick="startQuiz()">🔄 เริ่มใหม่อีกครั้ง (สุ่มคำใหม่)</button>
        </div>
    </div>

    <script>

const vocabData = [
const vocabData = [

    { word: "MIND", phonetic: "/maɪnd/", pos: "noun/verb", translation: "จิตใจ / ใส่ใจ / รังเกียจ" },

    { word: "SLIGHT", phonetic: "/slaɪt/", pos: "adjective", translation: "เล็กน้อย / นิดหน่อย" },
    { word: "SPOT", phonetic: "/spɒt/", pos: "noun/verb", translation: "จุด / สถานที่ / สังเกตเห็น" },
    { word: "STARE", phonetic: "/steə(r)/", pos: "verb/noun", translation: "จ้องมอง" },
    { word: "STICK", phonetic: "/stɪk/", pos: "noun/verb", translation: "ไม้เท้า / แท่ง / ติดอยู่ / แปะ" },
    { word: "STRANGE", phonetic: "/streɪndʒ/", pos: "adjective", translation: "แปลก / แปลกหน้า" },
    { word: "STUFF", phonetic: "/stʌf/", pos: "noun/verb", translation: "สิ่งของ / ยัดไส้" },
    { word: "SUDDEN", phonetic: "/ˈsʌdn/", pos: "adjective", translation: "กะทันหัน / ทันทีทันใด" },
    { word: "SUPPOSE", phonetic: "/səˈpəʊz/", pos: "verb", translation: "สมมติ / ทึกทักเอาเอง" },
    { word: "TAPE", phonetic: "/teɪp/", pos: "noun/verb", translation: "เทปพัน / สายวัด / บันทึกเสียง" },
    { word: "TEND", phonetic: "/tend/", pos: "verb", translation: "มักจะ / มีแนวโน้มที่จะ" },
    { word: "THICK", phonetic: "/θɪk/", pos: "adjective", translation: "หนา / ข้น" },
    { word: "THIRST", phonetic: "/θɜːst/", pos: "noun/verb", translation: "ความกระหายน้ำ" },
    { word: "THOUGH", phonetic: "/ðəʊ/", pos: "conjunction/adverb", translation: "แม้ว่า / ทั้งๆ ที่" },
    { word: "THROAT", phonetic: "/θrəʊt/", pos: "noun", translation: "ลำคอ" },
    { word: "TIGHT", phonetic: "/taɪt/", pos: "adjective/adverb", translation: "แน่น / คับ" },
    { word: "TILL", phonetic: "/tɪl/", pos: "conjunction/preposition", translation: "จนกระทั่ง / จนถึง" },
    { word: "TRUTH", phonetic: "/truːθ/", pos: "noun", translation: "ความจริง" },
    { word: "UNDERNEATH", phonetic: "/ˌʌndəˈniːθ/", pos: "preposition/adverb", translation: "ข้างใต้ / ภายใต้" },
    { word: "UPON", phonetic: "/əˈpɒn/", pos: "preposition", translation: "บน / บนผิวหน้า" },
    { word: "WHETHER", phonetic: "/ˈweðə(r)/", pos: "conjunction", translation: "ว่า...หรือไม่" },
    { word: "WORSE", phonetic: "/wɜːs/", pos: "adjective/adverb", translation: "แย่ลง / เลวร้ายกว่าเดิม" },
    { word: "WORTH", phonetic: "/wɜːθ/", pos: "adjective/noun", translation: "มีมูลค่า / มีค่าแก่การ" }
];

        // ⚙️ ตั้งค่าจำนวนข้อสอบที่จะสุ่มขึ้นมาเล่นต่อหนึ่งรอบ (ปรับเปลี่ยนได้ตามต้องการ)
        const QUESTIONS_PER_ROUND = 50; 

        let currentPool = [];
        let currentIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let hasAnswered = false;

        // ฟังก์ชันสุ่มลำดับ Array (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ฟังก์ชันเริ่มต้นทำแบบทดสอบใหม่
        function startQuiz() {
            // โคลนคลังคำศัพท์และสุ่มเลือกคำตามจำนวนข้อสอบที่กำหนดไว้
            let shuffledVocab = shuffle([...vocabData]);
            currentPool = shuffledVocab.slice(0, Math.min(QUESTIONS_PER_ROUND, vocabData.length));
            
            currentIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('summary-view').style.display = 'none';
            document.getElementById('total-count').innerText = currentPool.length;
            
            loadQuestion();
        }

        // แสดงคำถามและสร้างตัวเลือกคำตอบ 3 ตัวเลือก
        function loadQuestion() {
            hasAnswered = false;
            document.getElementById('btn-next').style.display = 'none';
            
            const currentData = currentPool[currentIndex];
            
            // แสดงข้อมูลคำศัพท์บนหน้าจอ
            document.getElementById('current-count').innerText = currentIndex + 1;
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = streak;
            document.getElementById('word-target').innerText = currentData.word;
            document.getElementById('word-pos').innerText = currentData.pos;
            document.getElementById('word-phonetic').innerText = currentData.phonetic;

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            // ดึงคำแปลอื่นๆ ทั้งหมดในคลังมาเตรียมเป็นตัวเลือกหลอก (คัดคำตอบที่ถูกออกก่อน)
            let wrongCandidates = vocabData
                .map(v => v.translation)
                .filter(t => t !== currentData.translation);
            
            // สุ่มเลือกตัวเลือกหลอกมา 3 ตัวเลือก
            wrongCandidates = shuffle(wrongCandidates).slice(0, 3);
            
            // รวมคำแปลที่ถูกกับคำแปลหลอกเข้าด้วยกัน แล้วสุ่มตำแหน่งปุ่ม
            let finalOptions = [currentData.translation, ...wrongCandidates];
            finalOptions = shuffle(finalOptions);

            // วนลูปสร้างปุ่มตัวเลือกขึ้นมาบนหน้าเว็บ
            finalOptions.forEach(optionText => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.innerText = optionText;
                btn.onclick = () => checkAnswer(btn, optionText, currentData.translation);
                optionsBox.appendChild(btn);
            });
        }

        // ฟังก์ชันการตรวจสอบคำตอบเมื่อผู้เรียนคลิกเลือกปุ่ม
        function checkAnswer(selectedBtn, selectedText, correctText) {
            if (hasAnswered) return; // ล็อกเพื่อป้องกันการคลิกคำตอบซ้ำ
            hasAnswered = true;

            const allButtons = document.querySelectorAll('.option-btn');
            
            if (selectedText === correctText) {
                // กรณีตอบถูกต้อง
                selectedBtn.classList.add('correct');
                score++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                
                // ถ้าระบบตอบถูกจะเปลี่ยนเป็นข้อถัดไปให้อัตโนมัติในเวลา 1 วินาที
                setTimeout(() => {
                    nextQuestion();
                }, 1000);
            } else {
                // กรณีตอบผิด
                selectedBtn.classList.add('wrong');
                streak = 0; // รีเซ็ตแต้ม Streak กองไฟกลับเป็นศูนย์
                
                // ไฮไลต์ปุ่มเฉลยตัวเลือกที่ถูกต้องเป็นสีเขียวทันทีเพื่อให้รู้ข้อที่ถูก
                allButtons.forEach(btn => {
                    if (btn.innerText === correctText) {
                        btn.classList.add('correct');
                    }
                });
                
                // แสดงปุ่ม "คำต่อไป" เพื่อให้ผู้เรียนคลิกเปลี่ยนข้อด้วยตนเองเมื่ออ่านเฉลยเสร็จ
                document.getElementById('btn-next').style.display = 'block';
            }

            // สั่งปิดการใช้งานปุ่มทั้งหมดชั่วคราวเพื่อให้อ่านผลลัพธ์
            allButtons.forEach(btn => btn.disabled = true);
            document.getElementById('score-display').innerText = score;
            document.getElementById('streak-display').innerText = streak;
        }

        // เปลี่ยนไปยังข้อถัดไป หรือเปลี่ยนไปหน้าสรุปผลถ้าทำครบกำหนด
        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentPool.length) {
                loadQuestion();
            } else {
                showSummary();
            }
        }

        // แสดงหน้าจอสรุปคะแนนหลังทำครบทุกข้อ
        function showSummary() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('summary-view').style.display = 'block';
            
            const percentage = Math.round((score / currentPool.length) * 100);
            document.getElementById('percent-display').innerText = percentage + "%";
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-total').innerText = currentPool.length;
            document.getElementById('streak-max-display').innerText = `🔥 ทำ Streak สูงสุดได้: ${maxStreak} ข้อติดต่อกัน`;
        }

        // เริ่มต้นการทำงานระบบทันทีที่เปิดหน้าเว็บ
        startQuiz();
    </script>

</body>
</html>
